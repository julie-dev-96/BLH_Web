name: Deploy static site to Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: self-hosted   # must match your runner's labels
    steps:
      - uses: actions/checkout@v4

      # If your site has a build step, add it here (and change path below).
      # - run: npm ci && npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # For plain HTML/CSS/JS sitting at repo root; change to 'dist' if you build.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    runs-on: self-hosted
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
