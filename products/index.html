<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Products · Bring Laika Home</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 2rem;
      max-width: 900px;
      width: 100%;
      padding: 3rem 1.5rem;
    }

    .product-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      text-decoration: none;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 20px;
      padding: 2rem 1.5rem;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .product-card:hover,
    .product-card:focus {
      transform: translateY(-4px);
      border-color: #3a3a3a;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
      text-decoration: none;
      outline: none;
    }

    .product-icon {
      width: 120px;
      height: 120px;
      border-radius: 26px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      flex-shrink: 0;
    }

    .product-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      text-align: center;
    }

    .product-name {
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      margin: 0;
    }

    .product-category {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #5ac85a;
      margin: 0;
    }

    .product-tagline {
      font-size: 0.875rem;
      color: var(--muted);
      margin: 0.2rem 0 0;
      line-height: 1.4;
    }

    .products-header {
      text-align: center;
      padding-top: 3rem;
    }

    .products-header h1 {
      margin-bottom: 0.5rem;
    }

    .products-header p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .product-card--soon {
      opacity: 0.45;
      cursor: default;
      pointer-events: none;
    }
    .product-icon--placeholder {
      width: 120px;
      height: 120px;
      border-radius: 26px;
      background: #1e1e1e;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <nav class="site-nav" aria-label="Primary">
    <div class="nav-inner">
      <a href="/" class="brand">Bring Laika Home</a>
      <ul class="nav-links" role="list">
        <li><a href="/">Home</a></li>
        <li><a href="/products" aria-current="page">Products</a></li>
        <li><a href="/contact">Contact</a></li>
      </ul>
    </div>
  </nav>

  <main class="content" style="justify-content: flex-start; align-items: center;">
    <div class="products-header">
      <h1>Products</h1>
      <p>Kind products.</p>
    </div>

    <div class="products-grid">
      <a href="/groundwork" class="product-card">
        <picture>
          <source srcset="/groundwork/app-icon.webp" type="image/webp">
          <img class="product-icon" src="/groundwork/app-icon.png" alt="Groundwork app icon" width="120" height="120" loading="lazy">
        </picture>
        <div class="product-info">
          <p class="product-category">iOS App</p>
          <p class="product-name">Groundwork</p>
          <p class="product-tagline">Helping environmental professionals with their fieldwork.</p>
        </div>
      </a>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-copy">© 2026 Bring Laika Home LLC</p>
      <nav aria-label="Footer">
        <ul class="nav-links" role="list">
          <li><a href="/">Home</a></li>
          <li><a href="/products">Products</a></li>
          <li><a href="/contact">Contact</a></li>
        </ul>
      </nav>
    </div>
  </footer>
</body>
</html>
